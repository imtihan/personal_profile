<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imtihan Ahmed | ML Engineer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1" aria-hidden="true"></div>
    <div class="bg-orb orb-2" aria-hidden="true"></div>

    <header class="hero container">
      <nav class="topbar">
        <h1 class="logo">Imtihan Ahmed</h1>
        <button id="themeToggle" aria-label="Toggle color theme">☀️ Light</button>
      </nav>

      <section class="hero-content">
        <img id="profileImage" class="profile-image" src="" alt="Imtihan Ahmed profile picture" />
        <div>
          <p class="eyebrow">Senior Machine Learning Engineer</p>
          <h2 id="name"></h2>
          <p id="headline" class="headline"></p>
          <p id="summary"></p>
          <div class="cta-row">
            <a id="githubLink" class="btn primary" href="#" target="_blank" rel="noreferrer">GitHub</a>
            <a id="linkedinLink" class="btn" href="#" target="_blank" rel="noreferrer">LinkedIn</a>
          </div>
        </div>
      </section>
    </header>

    <main class="container main-stack">
      <section class="section about">
        <h3>What I Build</h3>
        <div id="focusGrid" class="cards"></div>
      </section>

      <section class="section experience">
        <h3>Work Experience</h3>
        <div class="tabs" id="timelineTabs"></div>
        <div id="timeline" class="timeline"></div>
      </section>

      <section class="section projects">
        <h3>Publications & Projects</h3>
        <div id="projects" class="cards"></div>
      </section>

      <section class="section skills">
        <h3>Skills in Context</h3>
        <div id="skillsSummary" class="cards"></div>
        <h4 class="subheading">Languages & Tools</h4>
        <div id="techIcons" class="icon-grid"></div>
      </section>

      <section class="section education">
        <h3>Education</h3>
        <div id="education" class="cards"></div>
      </section>
    </main>

    <button id="scrollHint" class="scroll-hint" type="button" aria-label="Scroll to next section">
      <span>More below</span>
      <span aria-hidden="true">↓</span>
    </button>

    <footer class="container footer">
      <p>Built as a modern, vertically-scannable profile with resume-based content.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
